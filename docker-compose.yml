version: "3.8"

services:
  api:
    image: ghcr.io/Irah2001/docker-swarm:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
